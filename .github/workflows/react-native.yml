name: React Native CI

# Reusable workflow — call this from any React Native or Expo project:
#
#   Bare React Native (lint + typecheck + tests + dep scan):
#     jobs:
#       ci:
#         uses: <org>/cicd/.github/workflows/react-native.yml@main
#         secrets: inherit
#
#   Expo project:
#     jobs:
#       ci:
#         uses: <org>/cicd/.github/workflows/react-native.yml@main
#         with:
#           expo: true
#         secrets: inherit
#
#   Expo + EAS build on tags (single workflow, tag-conditional):
#     jobs:
#       ci:
#         uses: <org>/cicd/.github/workflows/react-native.yml@main
#         with:
#           expo: true
#           eas-build: ${{ startsWith(github.ref, 'refs/tags/v') }}
#           eas-auto-submit: ${{ startsWith(github.ref, 'refs/tags/v') }}
#         secrets: inherit
#
#   Bare RN + local Android debug build:
#     jobs:
#       ci:
#         uses: <org>/cicd/.github/workflows/react-native.yml@main
#         with:
#           build-android: true
#         secrets: inherit

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        type: string
        default: '22'
      package-manager:
        description: Package manager to use (npm, yarn, pnpm)
        type: string
        default: 'npm'
      install-command:
        description: Install command override (defaults to <pm> ci / install --frozen-lockfile)
        type: string
        default: ''
      lint-command:
        description: ESLint command (set to empty string to skip — default is skip since not all projects have ESLint configured)
        type: string
        default: ''
      typecheck-command:
        description: TypeScript type-check command (set to empty string to skip)
        type: string
        default: 'npx tsc --noEmit'
      test-command:
        description: Jest test command (set to empty string to skip)
        type: string
        default: 'npx jest --passWithNoTests --ci'
      expo:
        description: Set to true for Expo projects (runs expo-doctor, disables local Android Gradle build)
        type: boolean
        default: false
      # ── EAS cloud build ────────────────────────────────────────────────────
      eas-build:
        description: Run an EAS cloud build (requires EXPO_TOKEN secret, expo must be true)
        type: boolean
        default: false
      eas-platform:
        description: EAS build platform (ios, android, all)
        type: string
        default: 'all'
      eas-profile:
        description: EAS build profile (development, preview, production)
        type: string
        default: 'production'
      eas-auto-submit:
        description: Auto-submit to App Store / Play Store after EAS build
        type: boolean
        default: false
      # ── Local Android build ────────────────────────────────────────────────
      build-android:
        description: Build a debug APK locally via Gradle (bare RN only — ignored when expo is true)
        type: boolean
        default: false
      java-version:
        description: JDK version required for local Android builds
        type: string
        default: '17'
      android-build-command:
        description: Gradle command for local Android build
        type: string
        default: 'cd android && ./gradlew assembleDebug --no-daemon'
      # ── Runner config ──────────────────────────────────────────────────────
      runs-on:
        description: Runner label for lint/test/scan jobs
        type: string
        default: 'ubuntu-latest'
      android-runs-on:
        description: Runner label for local Android build job
        type: string
        default: 'ubuntu-latest'
    secrets:
      EXPO_TOKEN:
        description: Expo account token for EAS builds (required when eas-build is true)
        required: false
      DISCORD_WEBHOOK_URL:
        description: Discord webhook URL for build notifications
        required: false

jobs:
  lint-and-test:
    name: Lint, Type-check & Test
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: |
          custom="${{ inputs.install-command }}"
          pm="${{ inputs.package-manager }}"
          if [ -n "$custom" ]; then
            eval "$custom"
          elif [ "$pm" = "yarn" ]; then
            yarn install --frozen-lockfile
          elif [ "$pm" = "pnpm" ]; then
            corepack enable pnpm && pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Type-check
        if: ${{ inputs.typecheck-command != '' }}
        run: ${{ inputs.typecheck-command }}

      - name: Lint
        if: ${{ inputs.lint-command != '' }}
        run: ${{ inputs.lint-command }}
        continue-on-error: true

      - name: Expo doctor
        if: ${{ inputs.expo == true }}
        run: npx expo-doctor
        continue-on-error: true

      - name: Test
        if: ${{ inputs.test-command != '' }}
        run: ${{ inputs.test-command }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rn-test-results
          path: |
            junit*.xml
            test-results/
            coverage/
          if-no-files-found: ignore

  # ── EAS cloud build (Expo only) ─────────────────────────────────────────────
  eas-build:
    name: EAS Build (${{ inputs.eas-platform }} / ${{ inputs.eas-profile }})
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 10    # EAS builds run in Expo's cloud — this job just triggers them
    if: ${{ inputs.eas-build == true }}
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: |
          custom="${{ inputs.install-command }}"
          pm="${{ inputs.package-manager }}"
          if [ -n "$custom" ]; then
            eval "$custom"
          elif [ "$pm" = "yarn" ]; then
            yarn install --frozen-lockfile
          elif [ "$pm" = "pnpm" ]; then
            corepack enable pnpm && pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: EAS Build (+ auto-submit if enabled)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ "${{ inputs.eas-auto-submit }}" = "true" ]; then
            eas build --platform ${{ inputs.eas-platform }} \
                      --profile ${{ inputs.eas-profile }} \
                      --non-interactive \
                      --auto-submit
          else
            eas build --platform ${{ inputs.eas-platform }} \
                      --profile ${{ inputs.eas-profile }} \
                      --non-interactive
          fi

  # ── Local Android build (bare RN only) ──────────────────────────────────────
  build-android:
    name: Build Android Debug (local)
    runs-on: ${{ inputs.android-runs-on }}
    timeout-minutes: 30
    if: ${{ inputs.build-android == true && inputs.expo == false }}
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin

      - name: Install dependencies
        run: |
          custom="${{ inputs.install-command }}"
          pm="${{ inputs.package-manager }}"
          if [ -n "$custom" ]; then
            eval "$custom"
          elif [ "$pm" = "yarn" ]; then
            yarn install --frozen-lockfile
          elif [ "$pm" = "pnpm" ]; then
            corepack enable pnpm && pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Android debug APK
        run: ${{ inputs.android-build-command }}

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore

  # ── Dependency scan ──────────────────────────────────────────────────────────
  dependency-scan:
    name: Dependency Scan
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 15
    if: always()
    needs: lint-and-test
    permissions:
      contents: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: |
          custom="${{ inputs.install-command }}"
          pm="${{ inputs.package-manager }}"
          if [ -n "$custom" ]; then
            eval "$custom"
          elif [ "$pm" = "yarn" ]; then
            yarn install --frozen-lockfile
          elif [ "$pm" = "pnpm" ]; then
            corepack enable pnpm && pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: npm audit (security vulnerabilities)
        run: |
          if [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn audit --level moderate || true
          elif [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm audit --audit-level moderate || true
          else
            npm audit --audit-level=moderate || true
          fi
        continue-on-error: true

      - name: Check for outdated packages
        run: |
          if [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn outdated || true
          elif [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm outdated || true
          else
            npm outdated || true
          fi
        continue-on-error: true

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          ignore-unfixed: false
          vuln-type: library
          severity: CRITICAL,HIGH,MEDIUM

      - name: Trivy SARIF upload
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          vuln-type: library
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # ── Discord notification ─────────────────────────────────────────────────────
  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [lint-and-test, eas-build, build-android, dependency-scan]
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          lint="${{ needs.lint-and-test.result }}"
          eas="${{ needs.eas-build.result }}"
          android="${{ needs.build-android.result }}"
          scan="${{ needs.dependency-scan.result }}"

          # 'skipped' means the job was not requested — treat as neutral
          failed=false
          [[ "$lint"    == "failure" ]] && failed=true
          [[ "$eas"     == "failure" ]] && failed=true
          [[ "$android" == "failure" ]] && failed=true
          [[ "$scan"    == "failure" ]] && failed=true

          if [[ "$failed" == "false" ]]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "color=3066993" >> $GITHUB_OUTPUT
            echo "label=passed" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "color=15158332" >> $GITHUB_OUTPUT
            echo "label=failed" >> $GITHUB_OUTPUT
          fi

      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "$WEBHOOK_URL" ] && echo "No webhook configured, skipping" && exit 0
          curl -sf -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${{ steps.status.outputs.emoji }} ${{ github.repository }} — ${{ steps.status.outputs.label }}\",
                \"url\": \"https://gitea.tazindeed.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                \"color\": ${{ steps.status.outputs.color }},
                \"fields\": [
                  {\"name\": \"Branch / Tag\", \"value\": \"\`${{ github.ref_name }}\`\", \"inline\": true},
                  {\"name\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"Lint & Test\", \"value\": \"${{ needs.lint-and-test.result }}\", \"inline\": true},
                  {\"name\": \"EAS Build\", \"value\": \"${{ needs.eas-build.result }}\", \"inline\": true},
                  {\"name\": \"Android Build\", \"value\": \"${{ needs.build-android.result }}\", \"inline\": true},
                  {\"name\": \"Dependency Scan\", \"value\": \"${{ needs.dependency-scan.result }}\", \"inline\": true}
                ]
              }]
            }" \
            "$WEBHOOK_URL"
