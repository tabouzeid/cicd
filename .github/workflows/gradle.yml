name: Gradle CI

# Reusable workflow — call this from any Gradle project:
#
#   jobs:
#     ci:
#       uses: <org>/cicd/.github/workflows/gradle.yml@main
#       with:
#         java-version: '21'

on:
  workflow_call:
    inputs:
      java-version:
        description: JDK version to use
        type: string
        default: '21'
      java-distribution:
        description: JDK distribution (temurin, corretto, microsoft, zulu)
        type: string
        default: 'temurin'
      build-command:
        description: Command to compile/assemble (tests excluded)
        type: string
        default: './gradlew assemble'
      test-command:
        description: Command to run tests
        type: string
        default: './gradlew test'
      runs-on:
        description: Runner label
        type: string
        default: 'ubuntu-latest'
    secrets:
      DISCORD_WEBHOOK_URL:
        description: Discord webhook URL for build notifications
        required: false

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Test
        run: ${{ inputs.test-command }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore

  dependency-scan:
    name: Dependency Scan
    runs-on: ${{ inputs.runs-on }}
    # Run even if build-and-test fails so we still get security info
    if: always()
    needs: build-and-test
    permissions:
      contents: write          # required for dependency-submission API
      security-events: write   # required to upload SARIF results
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Feeds the GitHub dependency graph → enables Dependabot security alerts
      - name: Submit dependency graph
        uses: gradle/actions/dependency-submission@v4
        continue-on-error: true

      # Check for available upgrades (requires com.github.ben-manes.versions plugin)
      - name: Check for dependency updates
        run: |
          if ./gradlew help --task dependencyUpdates > /dev/null 2>&1; then
            ./gradlew dependencyUpdates --refresh-dependencies
          else
            echo "Skipping dependencyUpdates — add the com.github.ben-manes.versions plugin to enable this report."
          fi
        continue-on-error: true

      # Scan for known CVEs in all libraries
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          ignore-unfixed: false
          vuln-type: library
          severity: CRITICAL,HIGH,MEDIUM

      - name: Trivy SARIF upload (for GitHub Security tab)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          vuln-type: library
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [build-and-test, dependency-scan]
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.build-and-test.result }}" == "success" && \
                "${{ needs.dependency-scan.result }}" != "failure" ]]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "color=3066993" >> $GITHUB_OUTPUT
            echo "label=passed" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "color=15158332" >> $GITHUB_OUTPUT
            echo "label=failed" >> $GITHUB_OUTPUT
          fi

      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "$WEBHOOK_URL" ] && echo "No webhook configured, skipping" && exit 0
          curl -sf -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${{ steps.status.outputs.emoji }} ${{ github.repository }} — ${{ steps.status.outputs.label }}\",
                \"url\": \"https://gitea.tazindeed.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                \"color\": ${{ steps.status.outputs.color }},
                \"fields\": [
                  {\"name\": \"Branch\", \"value\": \"\`${{ github.ref_name }}\`\", \"inline\": true},
                  {\"name\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"Build & Test\", \"value\": \"${{ needs.build-and-test.result }}\", \"inline\": true},
                  {\"name\": \"Dependency Scan\", \"value\": \"${{ needs.dependency-scan.result }}\", \"inline\": true}
                ]
              }]
            }" \
            "$WEBHOOK_URL"
